databaseChangeLog:
  - changeSet:
      id: create-table-properties.yaml
      author: jesuslucifer
      changes:
        - createTable:
            tableName: properties
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: cadastral_number
                  type: BIGINT
              - column:
                  name: company_id
                  type: BIGINT
              - column:
                  name: title
                  type: NVARCHAR(255)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: property_type
                  type: VARCHAR(50)
              - column:
                  name: deal_type
                  type: VARCHAR(50)
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: district
                  type: VARCHAR(100)
              - column:
                  name: price
                  type: DECIMAL(15,2)
              - column:
                  name: sale_price
                  type: DECIMAL(15,2)
              - column:
                  name: area
                  type: DECIMAL(10,2)
              - column:
                  name: rooms
                  type: INT
              - column:
                  name: floor
                  type: INT
              - column:
                  name: total_floors
                  type: INT
              - column:
                  name: year_built
                  type: INT
              - column:
                  name: status
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

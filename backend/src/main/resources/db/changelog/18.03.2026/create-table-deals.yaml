databaseChangeLog:
  - changeSet:
      id: create-table-deals.yaml
      author: jesuslucifer
      changes:
        - createTable:
            tableName: deals
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: company_id
                  type: BIGINT
              - column:
                  name: client_id
                  type: BIGINT
              - column:
                  name: property_id
                  type: BIGINT
              - column:
                  name: agent_id
                  type: BIGINT
              - column:
                  name: status
                  type: VARCHAR(50)
              - column:
                  name: price
                  type: DECIMAL(15,2)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValue: NOW()
              - column:
                  name: closed_at
                  type: TIMESTAMP
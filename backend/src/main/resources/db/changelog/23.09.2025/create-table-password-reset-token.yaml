databaseChangeLog:
  - changeSet:
      id: create-table-password-reset-token.yaml
      author: jesuslucifer
      changes:
        - createTable:
            tableName: password-reset-token
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
              - column:
                  name: token
                  type: NVARCHAR(255)
              - column:
                  name: user_id
                  type: BIGINT
              - column:
                  name: expiry_date
                  type: datetime